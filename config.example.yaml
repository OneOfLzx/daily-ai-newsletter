# Sample configuration for daily AI newsletter
llm:
  api_key: "your-openai-api-key-here"
  model: "gpt-3.5-turbo"
  base_url: "https://api.openai.com/v1"

# Skill directory names under .agents/skills/<id>/SKILL.md — body (minus frontmatter) = system prompt
skills:
  web: article-summarization
  rss: article-summarization
  github: github-summarization
  translation: translation

# Optional: static page header — GitHub repo link button (separate from sources.github data sources)
site:
  github_repo_url: "https://github.com/your-org/daily-ai-newsletter"

ui:
  # If a source has more items than this, the rest are collapsed behind an expand button.
  max_visible_items_per_source: 3

processing:
  concurrency: 6
  # RSS: only keep items whose pubDate is within this many days (web/GitHub unchanged)
  max_article_recency_days: 2
  # GitHub: LLM requests tools; program calls GitMCP (https://gitmcp.io/<owner>/<repo>)
  github:
    mcp_max_rounds: 20
    mcp_timeout_ms: 120000
    mcp_max_tool_result_chars: 80000

sources:
